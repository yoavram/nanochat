[workspace]
authors = ["Yoav Ram <yoav@yoavram.com>"]
channels = ["conda-forge"]
name = "LLMs"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.14.3,<3.15"

[pypi-dependencies]

[target.osx-arm64.pypi-dependencies]
jax = ">=0.9.2, <0.10"

[target.linux-64.pypi-dependencies]
jax = { version = ">=0.9.2, <0.10", extras = ["cuda12"] }
numpy = ">=2.4.3, <3"
matplotlib = ">=3.10.8, <4"
pandas = ">=3.0.1, <4"
jupyterlab = ">=4.5.6, <5"
optax = ">=0.2.8, <0.3"
